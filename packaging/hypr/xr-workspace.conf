# xr-workspace — Hyprland integration snippet for VITURE XR glasses.
#
# Sourced from the main Hyprland config:  source = ~/.config/hypr/xr-workspace.conf
#
# Two integration options — keep ONE:
#
# (A) systemd user service (preferred on smplOS): the watcher is managed by
#     systemd and auto-restarts. Enable it once with:
#        systemctl --user enable --now xr-glasses.service
#     In that case you do NOT need the exec-once below.
#
# (B) Compositor-managed: if you are not using the systemd user unit, let
#     Hyprland start the watcher on login. Uncomment this line:
# exec-once = xr-glasses-hotplugd

# ── Window rules ──────────────────────────────────────────────────────────────
# The renderer is a layer-shell overlay, but keep an escape hatch: the recenter
# keybind works regardless of focus.
bind = CTRL SHIFT, C, exec, xrctl recenter

# Toggle the virtual workspace on/off manually (start/stop the renderer).
# Useful when the glasses are connected but you want flat mode temporarily.
bind = CTRL SHIFT, X, exec, pkill -x xr-workspace || xr-glasses-hotplugd --once
