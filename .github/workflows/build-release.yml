name: Build & Release

on:
  push:
    branches: [master]
    tags:    ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux/archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git cmake make gcc pkgconf \
            wayland wayland-protocols \
            mesa libglvnd

      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          strip build/xr-workspace

      - name: Package release tarball
        # Bundle the renderer binary together with the control clients (xrctl,
        # xr-game) and the hotplug watcher so a single asset named
        # xr-workspace-<version>-x86_64.tar.gz carries every artifact that
        # downstream consumers (smpl-apps) need.
        run: |
          set -euo pipefail
          version=$(tr -d '[:space:]' < VERSION)
          dist="xr-workspace-${version}-x86_64"
          mkdir -p "$dist"
          install -m755 build/xr-workspace "$dist/xr-workspace"
          install -m755 xrctl "$dist/xrctl"
          install -m755 xr-game "$dist/xr-game"
          install -m755 packaging/hotplug/xr-glasses-hotplugd "$dist/xr-glasses-hotplugd"
          tar -czf "${dist}.tar.gz" "$dist"
          echo "TARBALL=${dist}.tar.gz" >> "$GITHUB_ENV"
          ls -lh "${dist}.tar.gz"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: xr-workspace-arch-linux
          path: ${{ env.TARBALL }}

      # On tag push → create a versioned GitHub release
      - name: Release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
          generate_release_notes: true

      # On master push → update the rolling "latest" pre-release
      - name: Release (latest)
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build"
          prerelease: true
          files: ${{ env.TARBALL }}
